name: CI/CD Pipeline - Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 레포지토리 코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 다중 아키텍처 지원 및 로컬 캐싱을 돕는 Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인 (PR이 아닐 때 즉 푸시 상황일 때만 실행)
      # GitHub Repository Setting -> Secrets and Variables -> Actions 에
      # DOCKER_USERNAME 과 DOCKER_PASSWORD 를 미리 저장해야 합니다.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 이미지 태그와 라벨 자동 생성
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/mlops-age-prediction
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # 5. Docker 이미지 빌드 및 Docker Hub 푸시
      # 빌드 시간을 단축하기 위해 GitHub Actions 캐시(gha)를 활용합니다
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # pull_request 이벤트엔 빌드 테스트만 하고 Push는 하지 않습니다.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
