name: CI/CD Pipeline - Build, Push, and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # PR(Pull Request)이 아닐 때만 로그인
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-age-prediction
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Local Self-hosted Runner
    needs: build-and-push  # 빌드와 푸시가 성공적으로 끝난 후 실행
    if: github.event_name != 'pull_request'  # main 브랜치 푸시에만 배포 트리거
    runs-on: self-hosted  # 로컬 컴퓨터에 등록한 GitHub Self-hosted Runner 사용

    steps:
      - name: Deploy Docker Container
        run: |
          echo "배포를 시작합니다..."
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/mlops-age-prediction:latest"
          CONTAINER_NAME="mlops-age-prediction-server"

          echo "[1/4] 최신 이미지 Pull..."
          docker pull $IMAGE_NAME
          
          echo "[2/4] 구동중인 기존 컨테이너 중지..."
          docker stop $CONTAINER_NAME || true
          
          echo "[3/4] 기존 컨테이너 삭제..."
          docker rm $CONTAINER_NAME || true
          
          echo "[4/4] 새 컨테이너 실행..."
          docker run -d \
            --name $CONTAINER_NAME \
            -p 8000:8000 \
            --restart unless-stopped \
            $IMAGE_NAME
          
          echo "안 쓰는 예전 도커 이미지 정리 (Prune)..."
          docker image prune -f -a --filter "until=24h"
          
          echo "🎉 배포가 완료되었습니다! http://localhost:8000/docs 에 접속해보세요."
